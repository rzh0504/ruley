services:
  ruley:
    build: .
    # Or pull from GHCR instead of building locally:
    image: ghcr.io/rzh0504/ruley:latest
    container_name: ruley
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
