services:
  postgres:
    image: postgres:17-alpine
    container_name: ruley-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ruley
    volumes:
      - ruley-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ruley"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ruley-postgres-data:
